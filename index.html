<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ch09 AE2 — Diaporama</title>
  <style>
    :root { --w: 1280px; --h: 720px; }
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:#111; }
    .wrap { max-width: var(--w); margin: 0 auto; padding: 10px; }
    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0,0,0,.55);
    }
    .slide {
      position:absolute; inset:0;
      opacity:0; pointer-events:none;
      transition: opacity .35s ease;
    }
    .slide.active { opacity:1; pointer-events:auto; }
    .slide img.bg { width:100%; height:100%; object-fit:contain; display:block; background:#000; }
    canvas.overlay {
      position:absolute; inset:0;
      width:100%; height:100%;
    }
    .bar {
      display:flex; gap:8px; align-items:center; justify-content:center;
      margin-top:10px; flex-wrap:wrap;
    }
    button {
      border:0; border-radius: 10px;
      padding:10px 14px; font-size: 15px;
      cursor:pointer;
    }
    .status { color:#eee; font-size:14px; padding: 0 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stage" id="stage">
      <div class="slide" data-id="1"><img class="bg" src="assets/slide1.png" alt="Slide 1"></div>
      <div class="slide" data-id="2"><img class="bg" src="assets/slide2.png" alt="Slide 2"></div>
      <div class="slide" data-id="3">
        <img class="bg" src="assets/slide3.png" alt="Slide 3">
        <canvas class="overlay" width="1280" height="720"></canvas>
      </div>
      <div class="slide" data-id="4">
        <img class="bg" src="assets/slide4.png" alt="Slide 4">
        <canvas class="overlay" width="1280" height="720"></canvas>
      </div>
    </div>

    <div class="bar">
      <button id="prev">⏮️ Précédent</button>
      <button id="play">⏯️ Pause</button>
      <button id="next">⏭️ Suivant</button>
      <span class="status" id="status">–</span>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
