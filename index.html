<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ch09 – Animation (AE2)</title>
  <style>
    html,body{height:100%;margin:0;background:#111;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;}
    #wrap{height:100%;display:flex;flex-direction:column;}
    #stageWrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;}
    canvas{background:#000;max-width:100%;max-height:100%;width:auto;height:auto;border-radius:12px;box-shadow:0 18px 60px rgba(0,0,0,.55);}
    #bar{display:flex;gap:10px;align-items:center;justify-content:center;padding:10px 12px;color:#eee;}
    button{cursor:pointer;border:1px solid rgba(255,255,255,.18);background:#1d1d1d;color:#eee;border-radius:10px;padding:8px 12px;font-weight:600}
    button:active{transform:translateY(1px)}
    #hint{position:absolute;left:16px;top:16px;max-width:min(520px,calc(100% - 32px));
      padding:10px 12px;border-radius:12px;background:rgba(0,0,0,.55);color:#fff;
      border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(6px);font-size:14px;line-height:1.25}
    #hint b{font-size:14px}
    #progress{min-width:140px;text-align:center;opacity:.9}
  </style>
</head>
<body>
<div id="wrap">
  <div id="stageWrap">
    <canvas id="c" width="1280" height="720"></canvas>
    <div id="hint" style="display:none"></div>
  </div>
  <div id="bar">
    <button id="prev">⏮️ Précédent</button>
    <button id="play">⏸️ Pause</button>
    <button id="next">Suivant ⏭️</button>
    <div id="progress"></div>
  </div>
</div>
<script src="app.js?v=3"></script>
</body>
</html>
